version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orenplace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orenplace
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orenplace-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orenplace-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orenplace?schema=public
      JWT_SECRET: orenplace-super-secret-key-2026
      JWT_REFRESH_SECRET: orenplace-refresh-secret-key-2026
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - orenplace-network

volumes:
  postgres_data:

networks:
  orenplace-network:
    driver: bridge
